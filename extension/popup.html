<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 360px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      padding: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }
    .logo { font-size: 18px; font-weight: 700; color: #fff; }
    .logo span { color: #a78bfa; }
    .status {
      font-size: 11px;
      color: #888;
      margin-bottom: 12px;
    }
    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-primary {
      background: #7c3aed;
      color: #fff;
    }
    .btn-primary:hover { background: #6d28d9; }
    .btn-primary:disabled { background: #333; color: #666; cursor: not-allowed; }
    .btn-secondary {
      background: #1a1a1a;
      color: #a78bfa;
      border: 1px solid #333;
      margin-top: 8px;
    }
    .btn-secondary:hover { background: #222; }
    .preview {
      margin-top: 12px;
      background: #111;
      border-radius: 8px;
      padding: 12px;
      max-height: 200px;
      overflow-y: auto;
      font-size: 12px;
      line-height: 1.5;
      display: none;
    }
    .preview.show { display: block; }
    .preview h3 {
      font-size: 14px;
      color: #fff;
      margin-bottom: 4px;
    }
    .preview .meta {
      font-size: 10px;
      color: #666;
      margin-bottom: 8px;
    }
    .preview .snippet {
      color: #aaa;
    }
    .toast {
      position: fixed;
      bottom: 12px;
      left: 12px;
      right: 12px;
      background: #059669;
      color: #fff;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 12px;
      text-align: center;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>
  <div class="header">
    <span class="logo">🥛 <span>ChromeMilk</span></span>
  </div>
  <div class="status" id="status">Ready to extract knowledge.</div>
  <button class="btn btn-primary" id="extractBtn">Extract Knowledge</button>
  <button class="btn btn-secondary" id="searchBtn">Open Dashboard</button>
  <div class="preview" id="preview">
    <h3 id="previewTitle"></h3>
    <div class="meta" id="previewMeta"></div>
    <div class="snippet" id="previewSnippet"></div>
  </div>
  <div class="toast" id="toast"></div>
  <script src="popup.js"></script>
</body>
</html>
